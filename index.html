<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="theme-color" content="#0f0f11"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏏</text></svg>"/>
  <link rel="stylesheet" href="/css/main.css"/>

  <!-- Canonical Domain Redirect (Cross-Domain SSO) -->
  <script>
    (function() {
      var hostname = window.location.hostname;
      if (hostname === 'bailscricket.web.app' || hostname === 'bails-scorer.web.app') {
        window.location.replace('https://bails-cricketscorer.web.app' + window.location.pathname + window.location.search + window.location.hash);
      }
    })();
  </script>
</head>
<body>
  <div id="app-loader" class="loader-screen">

        <span>Dashboard</span>
      </a>
      <a class="nav-link" href="#/search" data-page="search">

        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 010-5H6M18 9h1.5a2.5 2.5 0 000-5H18M4 22h16M12 22V11.5M8 22V11.5M16 22V11.5M20 4H4v7.5c0 2.5 2 4.5 4.5 4.5h7c2.5 0 4.5-2 4.5-4.5V4z"/></svg>

      </a>

  <!-- WebTorrent for P2P cache sharing to reduce API/Server stress -->
  <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>

  <script src="/js/app.js"></script>
  <script>
    // Register the service worker, and if a NEWER service worker takes control
    // (i.e. this deploy bumped the cache version), force one reload so the
    // user immediately gets the fresh app shell instead of staying on
    // whatever was cached on their very first visit.
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
